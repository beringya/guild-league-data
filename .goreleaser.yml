version: 2

project_name: nsh-guild-analytics

builds:
  - id: nsh-guild-analytics
    dir: backend
    main: ./cmd/server
    binary: nsh-guild-analytics
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: binary
    ids:
      - nsh-guild-analytics
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: beringya
    name: guild-league-data
  extra_files:
    - glob: release/nsh-guild-analytics-{{ .Version }}.tar.gz
    - glob: release/nsh-guild-analytics-{{ .Version }}.tar.gz.sha256
