services:
  app:
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nsh_guild}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/${POSTGRES_DB:-nsh_guild_analytics}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nsh_guild}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-nsh_guild_analytics}
    volumes:
      - ${APP_POSTGRES_DIR:-./postgres}:/var/lib/postgresql/data
    networks:
      - nsh-guild-analytics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nsh_guild} -d ${POSTGRES_DB:-nsh_guild_analytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
