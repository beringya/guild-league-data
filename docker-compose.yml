services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18080}:8080"
    env_file:
      - .env
    volumes:
      - ${APP_DATA_DIR:-./data}:/app/data
      - ${APP_BACKUP_DIR:-./backups}:/app/backups
    networks:
      - nsh-guild-analytics
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  nsh-guild-analytics:
    name: ${COMPOSE_PROJECT_NAME:-nsh-guild-analytics}_net
